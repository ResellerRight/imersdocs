<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMersDocs | Creative Asset OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --p-mint: #10b981;
            --p-blue: #3b82f6;
            --p-purple: #8b5cf6;
            --p-pink: #ec4899;
            --p-orange: #f59e0b;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0;
            min-height: 100vh;
            background: #f8fafc;
            color: #1e293b;
            transition: all 0.5s ease;
        }

        /* Animated Mesh Background */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
        }

        .dark .mesh-bg {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.2) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.2) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
        }

        .frosted-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
            border-radius: 24px;
        }

        .dark .frosted-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
        }

        /* Admin Input Styles - High Contrast */
        .admin-field {
            background: white !important;
            border: 2px solid #e2e8f0 !important;
            color: #1e293b !important;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            width: 100%;
            outline: none;
            font-weight: 500;
        }
        .dark .admin-field {
            background: #334155 !important;
            border: 2px solid #475569 !important;
            color: white !important;
        }
        .admin-field:focus { border-color: var(--p-blue) !important; }

        select.admin-field option {
            background-color: white;
            color: black;
        }
        .dark select.admin-field option {
            background-color: #1e293b;
            color: white;
        }

        .category-header {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 12px;
            border-radius: 99px;
        }

        .btn-action {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-action:hover { transform: translateY(-2px) scale(1.02); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="light">
    <div class="mesh-bg"></div>

    <!-- Header -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center backdrop-blur-xl border-b border-black/5">
        <div class="flex items-center gap-3 cursor-pointer group" id="logoContainer">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-emerald-400 rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-6 transition-all">
                <i class="fas fa-sparkles text-white text-lg"></i>
            </div>
            <h1 class="text-xl font-extrabold tracking-tight">iMers<span class="text-blue-600">Docs</span></h1>
        </div>

        <div class="flex items-center gap-3">
            <div id="navContext" class="hidden md:flex items-center gap-2 bg-white/50 dark:bg-slate-800/50 px-4 py-2 rounded-full border border-black/5">
                <button onclick="showHome()" class="text-[10px] font-bold uppercase opacity-50 hover:opacity-100 transition-opacity">Library</button>
                <i class="fas fa-chevron-right text-[8px] opacity-20"></i>
                <span id="activeVaultName" class="text-[10px] font-bold uppercase text-blue-600">Vault</span>
            </div>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full frosted-card flex items-center justify-center hover:bg-white transition-all">
                <i class="fas fa-sun text-orange-400" id="themeIcon"></i>
            </button>
        </div>
    </nav>

    <!-- Home: Product Grid -->
    <main id="homeView" class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-6xl font-black mb-4 tracking-tight leading-none">
                Semua Aset <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-emerald-500">Dalam Satu Klik.</span>
            </h2>
            <p class="opacity-60 max-w-xl mx-auto text-sm font-medium">Platform distribusi konten terpusat untuk reseller dan affiliate marketing berkelas.</p>
        </div>

        <div class="max-w-2xl mx-auto mb-16 relative">
            <input type="text" id="globalSearch" oninput="handleSearch()" placeholder="Cari copywriting, banner, atau script..." 
                class="w-full frosted-card py-5 px-14 text-md outline-none focus:ring-4 focus:ring-blue-500/10 transition-all">
            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-blue-500/40"></i>
        </div>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Product Cards dynamic -->
        </div>
    </main>

    <!-- Vault: Flexible Hierarchy -->
    <section id="vaultView" class="hidden pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h3 id="vaultTitle" class="text-5xl font-black mb-2 tracking-tighter">Product</h3>
                <p id="vaultSummary" class="opacity-50 text-xs font-bold uppercase tracking-widest">Digital Asset Collection</p>
            </div>
            <div id="filterTabs" class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <!-- Filters -->
            </div>
        </div>
        
        <div id="contentGroups" class="space-y-16">
            <!-- Grouped items -->
        </div>
    </section>

    <!-- Admin Master Key -->
    <div id="adminAuth" class="hidden fixed inset-0 z-[100] backdrop-blur-2xl bg-white/20 dark:bg-black/20 flex items-center justify-center p-6">
        <div class="frosted-card p-10 w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-blue-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-xl">
                <i class="fas fa-key text-white text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-8">Admin Verification</h3>
            <input type="password" id="adminPass" placeholder="Master Key" class="admin-field text-center tracking-[0.5em] mb-6">
            <div class="flex gap-3">
                <button onclick="closeAdmin()" class="flex-1 py-3 text-[10px] font-bold uppercase opacity-50">Cancel</button>
                <button onclick="verifyAccess()" class="flex-[2] bg-blue-600 text-white py-3 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg">Enter Console</button>
            </div>
        </div>
    </div>

    <!-- Admin Console -->
    <div id="adminPanel" class="hidden fixed inset-0 z-[110] bg-slate-50 dark:bg-slate-900 overflow-y-auto">
        <div class="max-w-7xl mx-auto p-6 md:p-16">
            <div class="flex justify-between items-center mb-16">
                <div>
                    <h2 class="text-3xl font-black">Backstage <span class="text-blue-600">Control</span></h2>
                    <p class="opacity-40 text-[10px] font-bold uppercase mt-1">Setup your silos and assets</p>
                </div>
                <button onclick="closeAdmin()" class="w-12 h-12 rounded-xl frosted-card flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <div class="lg:col-span-5">
                    <form id="adminForm" onsubmit="saveAsset(event)" class="frosted-card p-8 space-y-6 sticky top-12">
                        <input type="hidden" id="editId">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Product Silo</label>
                                <select id="fProduct" class="admin-field">
                                    <option value="iMersWAMEL">iMersWAMEL</option>
                                    <option value="iMersGate">iMersGate</option>
                                    <option value="iMersAiBox">iMersAiBox</option>
                                    <option value="ResellerVault">ResellerVault</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Main Category</label>
                                <input type="text" id="fCategory" placeholder="e.g. Copywriting" class="admin-field">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Sub-Category (Optional)</label>
                            <input type="text" id="fSubCategory" placeholder="e.g. WA Soft Sell" class="admin-field">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Asset Headline</label>
                            <input type="text" id="fTitle" placeholder="Judul aset ini..." class="admin-field">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Media Link (Image/Banner)</label>
                            <input type="text" id="fImage" placeholder="https://..." class="admin-field">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Asset Content</label>
                            <textarea id="fContent" rows="6" placeholder="Paste copy or HTML code here..." class="admin-field resize-none leading-relaxed"></textarea>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition-all uppercase tracking-widest text-xs">
                            Publish to Vault
                        </button>
                    </form>
                </div>
                <div class="lg:col-span-7">
                    <h4 class="text-[10px] font-bold uppercase opacity-30 mb-6">Database Snapshot</h4>
                    <div id="adminList" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 z-[200] opacity-0 pointer-events-none transition-all">
        <div class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
            <i class="fas fa-check-circle"></i>
            <span class="text-xs font-bold uppercase tracking-widest">Aset Berhasil Disalin</span>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxxi-CuUu-jaXm5XN8pVl9xqQIHsBTHzPCu72clX210iTxaaFXc7yfh5R2uKXXTzFa3/exec';
        let allData = [];
        let logoClicks = 0;
        let adminPassword = '';

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            if (body.classList.contains('dark')) {
                body.classList.replace('dark', 'light');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.replace('light', 'dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('theme', 'dark');
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.replace('light', 'dark');
            document.getElementById('themeIcon').classList.replace('fa-sun', 'fa-moon');
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                allData = json.status === 'success' ? json.data : [];
                renderGrid();
            } catch (e) { console.error('Connection failed'); }
        }

        function renderGrid() {
            const products = [
                { id: 'iMersWAMEL', name: 'iMersWAMEL', icon: 'fa-whatsapp', color: 'bg-emerald-500', desc: 'Scripts' },
                { id: 'iMersGate', name: 'iMersGate', icon: 'fa-rocket', color: 'bg-blue-500', desc: 'Conversion' },
                { id: 'iMersAiBox', name: 'iMersAiBox', icon: 'fa-brain', color: 'bg-purple-500', desc: 'Prompts' },
                { id: 'ResellerVault', name: 'ResellerVault', icon: 'fa-gem', color: 'bg-orange-500', desc: 'Marketing' }
            ];

            document.getElementById('productGrid').innerHTML = products.map(p => {
                const count = allData.filter(d => d.product === p.id).length;
                return `
                    <div onclick="openVault('${p.id}')" class="frosted-card group p-8 cursor-pointer btn-action border-b-4 border-b-transparent hover:border-b-blue-500">
                        <div class="w-16 h-16 ${p.color} rounded-2xl flex items-center justify-center shadow-xl mb-8 group-hover:scale-110 transition-all">
                            <i class="fas ${p.icon} text-white text-2xl"></i>
                        </div>
                        <h4 class="text-2xl font-black mb-1">${p.name}</h4>
                        <p class="text-[10px] opacity-40 uppercase tracking-widest mb-6 font-bold">${p.desc}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-black/5 dark:border-white/5">
                            <span class="text-[10px] font-black text-blue-600">${count} ASSETS</span>
                            <i class="fas fa-arrow-right text-xs opacity-20"></i>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openVault(id) {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('vaultView').classList.remove('hidden');
            document.getElementById('navContext').classList.remove('hidden');
            document.getElementById('vaultTitle').innerText = id;
            document.getElementById('activeVaultName').innerText = id;
            renderFilters(id);
            renderContent(id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showHome() {
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('vaultView').classList.add('hidden');
            document.getElementById('navContext').classList.add('hidden');
        }

        function renderFilters(id) {
            const data = allData.filter(d => d.product === id);
            const cats = ['All', ...new Set(data.map(d => d.category))];
            document.getElementById('filterTabs').innerHTML = cats.map(c => `
                <button onclick="renderContent('${id}', '${c}')" class="px-6 py-2 whitespace-nowrap rounded-full frosted-card text-[10px] font-bold uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">
                    ${c}
                </button>
            `).join('');
        }

        function renderContent(id, filter = 'All') {
            let data = allData.filter(d => d.product === id);
            if(filter !== 'All') data = data.filter(d => d.category === filter);

            const categories = [...new Set(data.map(d => d.category))];
            const container = document.getElementById('contentGroups');
            
            if (data.length === 0) {
                container.innerHTML = `<div class="text-center opacity-10 py-32 font-bold text-2xl uppercase">Empty Vault</div>`;
                return;
            }

            container.innerHTML = categories.map(cat => {
                const subCats = [...new Set(data.filter(i => i.category === cat).map(i => i.sub_category || 'General'))];
                return `
                    <div>
                        <div class="flex items-center gap-6 mb-8">
                            <span class="category-header bg-blue-100 text-blue-600 dark:bg-blue-900/30">${cat}</span>
                            <div class="h-[1px] flex-1 bg-black/5 dark:bg-white/5"></div>
                        </div>
                        <div class="space-y-12">
                            ${subCats.map(sub => {
                                const items = data.filter(i => i.category === cat && (i.sub_category || 'General') === sub);
                                return `
                                    <div class="space-y-6">
                                        <h5 class="text-xs font-black uppercase text-pink-500 opacity-80 tracking-widest pl-4"># ${sub}</h5>
                                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            ${items.map(item => `
                                                <div class="frosted-card group p-6 flex flex-col hover:border-blue-500/30 transition-all">
                                                    ${item.image_url ? `<img src="${item.image_url}" class="w-full aspect-video object-cover rounded-xl mb-4" onerror="this.style.display='none'">` : ''}
                                                    <h6 class="font-bold text-lg mb-3 leading-tight">${item.title}</h6>
                                                    <div class="bg-black/5 dark:bg-white/5 rounded-xl p-4 text-[11px] leading-relaxed opacity-60 mb-6 flex-1 whitespace-pre-line font-medium overflow-y-auto max-h-[200px] no-scrollbar">
                                                        ${item.content}
                                                    </div>
                                                    <div class="flex gap-2">
                                                        <button onclick="copyContent(event, \`${item.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)" 
                                                            class="flex-1 py-3 rounded-xl bg-blue-600 text-white font-bold text-[10px] tracking-widest btn-action uppercase">
                                                            Salin Teks
                                                        </button>
                                                        ${item.image_url ? `<a href="${item.image_url}" target="_blank" download class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center opacity-40 hover:opacity-100 transition-all"><i class="fas fa-download"></i></a>` : ''}
                                                    </div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function copyContent(e, text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const t = document.getElementById('toast');
            t.style.opacity = '1';
            t.style.transform = 'translate(-50%, -10px)';
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transform = 'translate(-50%, 0)';
            }, 2000);
        }

        function handleSearch() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            if(q.length > 0) {
                const filtered = allData.filter(d => 
                    d.title.toLowerCase().includes(q) || 
                    d.content.toLowerCase().includes(q) || 
                    d.category.toLowerCase().includes(q)
                );
                renderSearchResults(filtered);
            } else { renderGrid(); }
        }

        function renderSearchResults(data) {
            const grid = document.getElementById('productGrid');
            if(data.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center opacity-10 font-bold text-xl uppercase">No matches found</div>`;
                return;
            }
            grid.innerHTML = data.map(item => `
                <div class="frosted-card p-6">
                    <span class="text-[7px] font-bold uppercase text-blue-600 mb-2 block">${item.product} • ${item.category}</span>
                    <h5 class="text-sm font-bold mb-4">${item.title}</h5>
                    <button onclick="copyContent(event, \`${item.content.replace(/`/g, '\\`')}\`)" class="w-full py-3 rounded-xl bg-blue-600 text-white font-bold text-[9px] uppercase tracking-widest">
                        Copy Asset
                    </button>
                </div>
            `).join('');
        }

        document.getElementById('logoContainer').onclick = () => {
            logoClicks++;
            if(logoClicks >= 5) {
                document.getElementById('adminAuth').classList.remove('hidden');
                logoClicks = 0;
            }
        };

        function closeAdmin() {
            document.getElementById('adminAuth').classList.add('hidden');
            document.getElementById('adminPanel').classList.add('hidden');
        }

        async function verifyAccess() {
            const pass = document.getElementById('adminPass').value;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'VERIFY', password: pass })
                });
                const data = await res.json();
                if(data.status === 'success') {
                    adminPassword = pass;
                    document.getElementById('adminAuth').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    renderAdminList();
                } else { alert('Master Key Incorrect'); }
            } catch (e) { alert('Server Error'); }
        }

        async function saveAsset(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = "Processing...";
            btn.disabled = true;
            
            const payload = {
                action: document.getElementById('editId').value ? 'UPDATE' : 'ADD',
                password: adminPassword,
                id: document.getElementById('editId').value,
                product: document.getElementById('fProduct').value,
                category: document.getElementById('fCategory').value,
                sub_category: document.getElementById('fSubCategory').value,
                title: document.getElementById('fTitle').value,
                content: document.getElementById('fContent').value,
                image_url: document.getElementById('fImage').value
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();
                if(data.status === 'success') {
                    document.getElementById('adminForm').reset();
                    document.getElementById('editId').value = '';
                    await loadData();
                    renderAdminList();
                    btn.innerText = "Asset Published!";
                    setTimeout(() => { btn.innerText = "Publish to Vault"; btn.disabled = false; }, 2000);
                } else { alert('Error: ' + data.message); btn.innerText = "Error"; btn.disabled = false; }
            } catch (e) { alert('Network error'); btn.innerText = "Error"; btn.disabled = false; }
        }

        async function deleteItem(id) {
            if(!confirm('Permanently remove this asset?')) return;
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'DELETE', password: adminPassword, id: id })
            });
            await loadData();
            renderAdminList();
        }

        function editItem(id) {
            const item = allData.find(d => d.id == id);
            document.getElementById('editId').value = item.id;
            document.getElementById('fProduct').value = item.product;
            document.getElementById('fCategory').value = item.category;
            document.getElementById('fSubCategory').value = item.sub_category || '';
            document.getElementById('fTitle').value = item.title;
            document.getElementById('fContent').value = item.content;
            document.getElementById('fImage').value = item.image_url || '';
            document.getElementById('submitBtn').innerText = "Update Asset";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderAdminList() {
            const sorted = [...allData].sort((a,b) => a.product.localeCompare(b.product));
            document.getElementById('adminList').innerHTML = sorted.map(item => `
                <div class="frosted-card p-4 flex justify-between items-center">
                    <div class="flex items-center gap-4 text-left">
                        ${item.image_url ? `<img src="${item.image_url}" class="w-10 h-10 rounded-lg object-cover shadow-lg">` : `<div class="w-10 h-10 bg-slate-200 dark:bg-slate-700 rounded-lg flex items-center justify-center opacity-50"><i class="fas fa-file text-[10px]"></i></div>`}
                        <div>
                            <div class="flex items-center gap-2 mb-0.5">
                                <span class="text-[7px] font-bold uppercase text-blue-600">${item.product}</span>
                                <span class="text-[7px] opacity-40 font-bold uppercase">• ${item.category}</span>
                                <span class="text-[7px] opacity-40 font-bold uppercase">• ${item.sub_category || 'General'}</span>
                            </div>
                            <p class="font-bold text-[13px] tracking-tight">${item.title}</p>
                        </div>
                    </div>
                    <div class="flex gap-1.5">
                        <button onclick="editItem('${item.id}')" class="w-9 h-9 rounded-lg bg-blue-500/10 text-blue-600 hover:bg-blue-600 hover:text-white transition-all"><i class="fas fa-edit text-[10px]"></i></button>
                        <button onclick="deleteItem('${item.id}')" class="w-9 h-9 rounded-lg bg-red-500/10 text-red-600 hover:bg-red-600 hover:text-white transition-all"><i class="fas fa-trash-alt text-[10px]"></i></button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
