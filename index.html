<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMersDocs | Asset OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome v6 (Sesuai gambar sumber user) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #FFFFFF; 
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar permanent left - SaaS Style */
        .sidebar { width: 280px; border-right: 1px solid #F3F4F6; }
        
        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            margin: 2px 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #4B5563;
            transition: all 0.2s;
            cursor: pointer;
        }
        .sidebar-link:hover { background-color: #F9FAFB; color: #111827; }
        .sidebar-link.active { background-color: #EEF2FF; color: #4F46E5; }

        .alphabet-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            padding: 20px 28px 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Main Content area */
        .content-area { flex: 1; height: 100vh; overflow-y: auto; background-color: #FBFCFD; }

        /* SaaS Card */
        .asset-card {
            background: #FFFFFF;
            border: 1px solid #F3F4F6;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .asset-card:hover { 
            border-color: #E5E7EB; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); 
            transform: translateY(-2px);
        }

        .saas-input {
            width: 100%;
            background: #FFFFFF;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .saas-input:focus { border-color: #4F46E5; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }

        .color-picker-input {
            height: 42px;
            padding: 2px;
            cursor: pointer;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        .btn-saas {
            background-color: #111827;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-saas:hover { background-color: #1F2937; transform: translateY(-1px); }
        
        .admin-badge {
            background: #FEF2F2;
            color: #991B1B;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 800;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="sidebar flex flex-col h-full bg-white">
        <!-- Logo Section -->
        <div class="p-8 flex items-center gap-3 cursor-pointer group" id="logoBtn">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-indigo-100 shadow-xl group-active:scale-90 transition-all">
                <i class="fa-solid fa-box-open text-white text-xs"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-900">iMers<span class="text-indigo-600">Docs</span></h1>
        </div>

        <!-- Sidebar Navigation -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-10">
            <div class="px-6 mb-2">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Workspace</p>
            </div>
            <div onclick="showHome()" class="sidebar-link active" id="navHome">
                <i class="fa-solid fa-house mr-3 w-4"></i> Overview
            </div>

            <!-- List produk per abjad diinjeksi di sini -->
            <div id="sidebarProductList"></div>

            <!-- Menu Admin Tersembunyi (Klik Logo 5x) -->
            <div id="adminMenu" class="hidden mt-8 border-t border-gray-100 pt-6">
                <div class="px-6 mb-2 flex justify-between items-center">
                    <p class="text-[10px] font-bold text-red-400 uppercase tracking-widest px-2">Console</p>
                    <span class="admin-badge">Admin</span>
                </div>
                <div onclick="checkAdmin('asset')" class="sidebar-link" id="navAsset">
                    <i class="fa-solid fa-file-invoice mr-3 w-4 text-emerald-500"></i> Manage Assets
                </div>
                <div onclick="checkAdmin('product')" class="sidebar-link" id="navProduct">
                    <i class="fa-solid fa-folder-plus mr-3 w-4 text-pink-500"></i> Manage Products
                </div>
            </div>
        </div>
    </aside>

    <!-- AREA KONTEN -->
    <main class="content-area flex flex-col no-scrollbar">
        
        <!-- Header SaaS -->
        <header class="bg-white border-b border-gray-100 px-10 py-5 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-bold text-gray-900" id="headerTitle">Asset Library</h2>
                <div id="breadcrumb" class="hidden flex items-center gap-2">
                    <i class="fa-solid fa-chevron-right text-[8px] text-gray-300"></i>
                    <span id="breadcrumbActive" class="text-xs text-indigo-600 font-semibold px-2 py-1 bg-indigo-50 rounded-md">Vault</span>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="relative w-64 group">
                    <input type="text" id="globalSearch" oninput="doSearch()" placeholder="Cari aset..." class="saas-input pl-10 text-xs bg-gray-50 border-transparent focus:bg-white focus:border-gray-200">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs group-focus-within:text-indigo-500 transition-colors"></i>
                </div>
                <button onclick="logoutAdmin()" id="logoutBtn" class="hidden w-8 h-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all">
                    <i class="fa-solid fa-power-off text-xs"></i>
                </button>
            </div>
        </header>

        <!-- View Dinamis -->
        <div id="viewArea" class="p-10 animate-in">
            <!-- Konten diinjeksi secara JS -->
        </div>

    </main>

    <!-- MODAL OTENTIKASI -->
    <div id="adminAuth" class="hidden fixed inset-0 z-[100] bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-10 w-full max-w-sm rounded-2xl shadow-2xl border border-gray-100">
            <div class="w-14 h-14 bg-indigo-50 rounded-xl mx-auto mb-6 flex items-center justify-center">
                <i class="fa-solid fa-shield-halved text-indigo-600 text-xl"></i>
            </div>
            <h3 class="text-xl font-bold mb-2 text-center">Verify Access</h3>
            <p class="text-xs text-gray-400 mb-8 text-center text-balance">Masukkan Master Key untuk membuka akses administratif.</p>
            <input type="password" id="adminPass" placeholder="••••••••" class="saas-input text-center tracking-[1em] mb-8 font-black text-lg py-3">
            <div class="flex gap-4">
                <button onclick="closeAuth()" class="flex-1 py-3 text-xs font-bold text-gray-400 uppercase tracking-widest">Batal</button>
                <button onclick="loginAdmin()" class="flex-1 btn-saas shadow-indigo-100 shadow-xl">Unlock</button>
            </div>
        </div>
    </div>

    <!-- FEEDBACK TOAST -->
    <div id="toast" class="fixed bottom-10 right-10 z-[200] opacity-0 pointer-events-none transition-all duration-500">
        <div class="bg-indigo-600 text-white px-6 py-3 rounded-xl flex items-center gap-3 shadow-2xl border border-white/10">
            <i class="fa-solid fa-check-circle text-white"></i>
            <span class="text-xs font-semibold">Teks berhasil disalin!</span>
        </div>
    </div>

    <!-- MODAL PREVIEW -->
    <div id="htmlPreview" class="hidden fixed inset-0 z-[150] bg-gray-900/50 backdrop-blur-md flex items-center justify-center p-12">
        <div class="bg-white w-full max-w-6xl h-full rounded-3xl overflow-hidden flex flex-col shadow-2xl border border-gray-100">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h4 class="font-bold text-xs tracking-widest text-indigo-600 uppercase">Interactive Asset Preview</h4>
                <button onclick="closePreview()" class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center text-gray-400 hover:text-gray-900 transition-colors"><i class="fa-solid fa-times"></i></button>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full border-none"></iframe>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxxi-CuUu-jaXm5XN8pVl9xqQIHsBTHzPCu72clX210iTxaaFXc7yfh5R2uKXXTzFa3/exec';
        let db = { assets: [], products: [] };
        let adminPass = '';
        let clicks = 0;
        let activeView = 'home';
        let adminAuthRequestView = '';

        // --- CORE UI & AUTH ---

        document.getElementById('logoBtn').onclick = () => { 
            if(++clicks >= 5) { 
                document.getElementById('adminAuth').classList.remove('hidden'); 
                adminAuthRequestView = 'admin_unlock';
                clicks=0; 
            } 
        };

        function closeAuth() { document.getElementById('adminAuth').classList.add('hidden'); }

        async function fetchDB() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                if(json.status === 'success') {
                    db = json.data;
                    renderSidebar();
                    renderByView();
                }
            } catch (e) { 
                console.error('Database connection lost.'); 
                renderHome(); 
            }
        }

        async function loginAdmin() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'VERIFY', password:pass}) });
            const json = await res.json();
            if(json.status === 'success') {
                adminPass = pass;
                closeAuth();
                document.getElementById('adminMenu').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                if(adminAuthRequestView === 'asset') renderAdminAssets();
                else if(adminAuthRequestView === 'product') renderAdminProducts();
                else if(adminAuthRequestView === 'admin_unlock') renderHome();
            } else { alert('Master Key Invalid!'); }
        }

        function logoutAdmin() {
            adminPass = '';
            document.getElementById('adminMenu').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            showHome();
        }

        function checkAdmin(view) {
            adminAuthRequestView = view;
            if(!adminPass) {
                document.getElementById('adminAuth').classList.remove('hidden');
            } else {
                if(view === 'asset') renderAdminAssets();
                else if(view === 'product') renderAdminProducts();
            }
        }

        function updateNav(activeId) {
            document.querySelectorAll('.sidebar-link').forEach(n => n.classList.remove('active'));
            const active = document.getElementById(activeId);
            if(active) active.classList.add('active');
        }

        function renderByView() {
            if(activeView === 'home') renderHome();
            else if(activeView === 'asset') renderAdminAssets();
            else if(activeView === 'product') renderAdminProducts();
        }

        // --- Sidebar Alphabet Grouping ---

        function renderSidebar() {
            if (!db.products || db.products.length === 0) return;
            
            const sorted = [...db.products].sort((a,b) => a.name.localeCompare(b.name));
            const grouped = sorted.reduce((acc, p) => {
                const letter = p.name[0].toUpperCase();
                if(!acc[letter]) acc[letter] = [];
                acc[letter].push(p);
                return acc;
            }, {});

            let html = '';
            Object.keys(grouped).sort().forEach(letter => {
                html += `<div class="alphabet-label">${letter}</div>`;
                grouped[letter].forEach(p => {
                    const color = p.color || '#4F46E5';
                    html += `
                        <div onclick="openVault('${p.name}')" class="sidebar-link" id="side-${p.name}">
                            <i class="${p.icon || 'fa-solid fa-folder'} mr-3 w-4 opacity-50" style="color: ${color}"></i> ${p.name}
                        </div>
                    `;
                });
            });
            document.getElementById('sidebarProductList').innerHTML = html;
        }

        // --- VIEWS ---

        function renderHome() {
            activeView = 'home';
            updateNav('navHome');
            document.getElementById('headerTitle').innerText = "Overview Dashboard";
            document.getElementById('breadcrumb').classList.add('hidden');

            if (!db.products || db.products.length === 0) {
                document.getElementById('viewArea').innerHTML = `
                    <div class="flex flex-col items-center justify-center py-40 opacity-30">
                        <i class="fa-solid fa-cloud-arrow-up text-4xl mb-4 text-gray-200"></i>
                        <p class="font-bold uppercase tracking-widest text-sm text-center text-gray-400">Belum ada silo produk terdaftar.<br>Silakan tambah via Manage Products (Klik logo 5x).</p>
                    </div>`;
                return;
            }

            const html = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    ${db.products.map(p => {
                        const count = db.assets.filter(a => a.product === p.name).length;
                        const color = p.color || '#4F46E5';
                        return `
                            <div onclick="openVault('${p.name}')" class="asset-card p-10 flex flex-col cursor-pointer group h-full">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white mb-8 shadow-md group-hover:scale-110 transition-transform" style="background: ${color}">
                                    <i class="${p.icon || 'fa-solid fa-folder'} text-xl"></i>
                                </div>
                                <h4 class="text-xl font-bold text-gray-900 mb-2 uppercase tracking-tight">${p.name}</h4>
                                <p class="text-xs text-gray-400 mb-10 leading-relaxed">${p.desc || 'Deskripsi tidak tersedia'}</p>
                                <div class="flex justify-between items-center mt-auto pt-6 border-t border-gray-50">
                                    <span class="text-[10px] font-bold uppercase tracking-widest" style="color: ${color}">${count} Assets Ready</span>
                                    <i class="fa-solid fa-chevron-right text-[10px] text-gray-300"></i>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        function openVault(name) {
            activeView = 'vault';
            updateNav(`side-${name}`);
            document.getElementById('headerTitle').innerText = name;
            document.getElementById('breadcrumb').classList.remove('hidden');
            document.getElementById('breadcrumbActive').innerText = name;

            const assets = db.assets.filter(a => a.product === name);
            const groups = [...new Set(assets.map(a => a.category))];

            if(assets.length === 0) {
                document.getElementById('viewArea').innerHTML = `<div class="py-40 text-center text-gray-300 font-bold uppercase tracking-widest animate-in">Silo ini masih kosong.</div>`;
                return;
            }

            let html = groups.map(g => {
                const subs = [...new Set(assets.filter(a=>a.category===g).map(a=>a.sub_category || 'General'))];
                return `
                    <div class="mb-20 animate-in">
                        <div class="flex items-center gap-4 mb-8">
                            <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-gray-900 px-5 py-2 bg-white border border-gray-100 rounded-xl shadow-sm">${g}</h3>
                            <div class="h-[1px] flex-1 bg-gray-100"></div>
                        </div>
                        <div class="space-y-12">
                            ${subs.map(s => `
                                <div class="space-y-6">
                                    <h5 class="text-[10px] font-bold uppercase text-indigo-500 tracking-[0.3em] flex items-center gap-2">
                                        <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div> ${s}
                                    </h5>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                        ${assets.filter(a=>a.category===g && (a.sub_category||'General')===s).map(item => {
                                            const isHtml = item.content.trim().startsWith('<');
                                            return `
                                                <div class="asset-card p-6 flex flex-col group">
                                                    ${item.image_url ? `<img src="${item.image_url}" class="w-full aspect-video object-cover rounded-xl mb-4 border border-gray-50 shadow-sm" onerror="this.style.display='none'">` : ''}
                                                    <div class="flex justify-between items-start mb-4">
                                                        <h6 class="font-bold text-gray-900 text-sm leading-tight">${item.title}</h6>
                                                        ${isHtml ? `<span class="bg-indigo-50 text-indigo-600 text-[8px] font-bold px-2 py-1 rounded uppercase tracking-widest">HTML</span>` : ''}
                                                    </div>
                                                    <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 text-[11px] leading-relaxed text-gray-500 mb-8 flex-1 whitespace-pre-line overflow-y-auto max-h-32 no-scrollbar font-medium">${item.content}</div>
                                                    <div class="flex gap-2">
                                                        <button onclick="copyToClip(\`${item.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)" class="flex-1 btn-saas text-[10px] uppercase tracking-widest">Salin Teks</button>
                                                        ${isHtml ? `<button onclick="previewHtml(\`${item.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)" class="w-10 h-10 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-gray-400 hover:text-indigo-600 transition-all"><i class="fa-solid fa-eye text-xs"></i></button>` : ''}
                                                        ${item.image_url ? `<a href="${item.image_url}" target="_blank" class="w-10 h-10 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-gray-400 hover:text-emerald-500 transition-all"><i class="fa-solid fa-download text-xs"></i></a>` : ''}
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('viewArea').innerHTML = html;
        }

        // --- ADMIN MANAGEMENT ---

        function renderAdminAssets() {
            activeView = 'asset';
            updateNav('navAsset');
            document.getElementById('headerTitle').innerText = "Manajemen Aset";
            document.getElementById('breadcrumb').classList.add('hidden');

            const html = `
                <div class="grid grid-cols-1 xl:grid-cols-12 gap-12 animate-in">
                    <div class="xl:col-span-4">
                        <div class="bg-white border border-gray-100 p-8 rounded-2xl shadow-sm sticky top-5">
                            <h4 class="font-bold text-gray-900 mb-8 uppercase text-[10px] tracking-widest border-b border-gray-50 pb-4">Editor Konten</h4>
                            <form id="assetForm" onsubmit="handleAssetSubmit(event)" class="space-y-5">
                                <input type="hidden" id="assetId">
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Silo Tujuan</label>
                                    <select id="fAssetProduct" class="saas-input font-bold text-gray-700">${db.products.map(p=>`<option value="${p.name}">${p.name}</option>`).join('')}</select>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="space-y-1.5">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Kategori Utama</label>
                                        <input type="text" id="fAssetCat" placeholder="e.g. Copywriting" class="saas-input">
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Sub-Kategori</label>
                                        <input type="text" id="fAssetSub" placeholder="e.g. Soft Sell" class="saas-input">
                                    </div>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Nama / Judul</label>
                                    <input type="text" id="fAssetTitle" placeholder="Headline..." class="saas-input">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Media URL (Gambar)</label>
                                    <input type="text" id="fAssetImg" placeholder="https://..." class="saas-input">
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Isi Konten</label>
                                    <textarea id="fAssetContent" rows="6" placeholder="Paste konten di sini..." class="saas-input resize-none leading-relaxed text-xs"></textarea>
                                </div>
                                <button type="submit" id="assetBtn" class="w-full btn-saas py-3 text-xs uppercase tracking-widest shadow-xl">Publish Asset</button>
                            </form>
                        </div>
                    </div>
                    <div class="xl:col-span-8 space-y-3">
                        <div class="flex items-center gap-4 mb-6 px-2">
                            <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Active Database (${db.assets.length})</p>
                            <div class="h-[1px] flex-1 bg-gray-100"></div>
                        </div>
                        ${db.assets.map(a => `
                            <div class="bg-white border border-gray-100 p-6 rounded-xl flex justify-between items-center transition-all hover:border-gray-200 group">
                                <div class="flex items-center gap-4">
                                    <div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center text-gray-300 group-hover:text-indigo-600 transition-colors"><i class="fa-solid fa-file-code"></i></div>
                                    <div>
                                        <p class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mb-1">${a.product} • ${a.category}</p>
                                        <h6 class="font-bold text-gray-900 text-sm">${a.title}</h6>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="editAsset('${a.id}')" class="w-9 h-9 bg-gray-50 text-gray-400 rounded-lg hover:text-indigo-600 transition-all"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="deleteAsset('${a.id}')" class="w-9 h-9 bg-gray-50 text-gray-400 rounded-lg hover:text-red-500 transition-all"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        function renderAdminProducts() {
            activeView = 'product';
            updateNav('navProduct');
            document.getElementById('headerTitle').innerText = "Manajemen Silo Produk";
            document.getElementById('breadcrumb').classList.add('hidden');

            const html = `
                <div class="grid grid-cols-1 xl:grid-cols-12 gap-12 animate-in">
                    <div class="xl:col-span-4">
                        <div class="bg-white border border-gray-100 p-10 rounded-2xl shadow-sm sticky top-5">
                            <h4 class="font-bold text-gray-900 mb-8 uppercase text-[10px] tracking-widest border-b border-gray-50 pb-4">Registrasi Produk Baru</h4>
                            <form id="productForm" onsubmit="handleProductSubmit(event)" class="space-y-6">
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Nama Produk</label>
                                    <input type="text" id="fProdName" placeholder="e.g. iMersGate" class="saas-input">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="space-y-1.5">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Ikon (FontAwesome)</label>
                                        <input type="text" id="fProdIcon" placeholder="e.g. fa-solid fa-rocket" class="saas-input">
                                        <a href="https://fontawesome.com/v6/search?o=r&m=free" target="_blank" class="text-[9px] text-indigo-500 font-bold hover:underline">Copy class dari situs FA →</a>
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Warna Brand</label>
                                        <input type="color" id="fProdColor" value="#4F46E5" class="saas-input color-picker-input">
                                    </div>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Tagline / Deskripsi Singkat</label>
                                    <input type="text" id="fProdDesc" placeholder="Penjelasan singkat silo..." class="saas-input">
                                </div>
                                <button type="submit" id="prodBtn" class="w-full btn-saas py-3 text-xs uppercase tracking-widest shadow-xl">Create Silo</button>
                            </form>
                        </div>
                    </div>
                    <div class="xl:col-span-8 space-y-4">
                        <div class="flex items-center gap-4 mb-6 px-2">
                            <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Silo Aktif (${db.products.length})</p>
                            <div class="h-[1px] flex-1 bg-gray-100"></div>
                        </div>
                        ${db.products.map(p => `
                            <div class="bg-white border border-gray-100 p-8 rounded-2xl flex justify-between items-center transition-all hover:bg-gray-50">
                                <div class="flex items-center gap-6">
                                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white shadow-md" style="background: ${p.color || '#4F46E5'}"><i class="${p.icon || 'fa-solid fa-folder'} text-xl"></i></div>
                                    <div>
                                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest px-3 py-1 bg-gray-100 rounded-lg inline-block mb-1">Authenticated Silo</p>
                                        <h6 class="font-bold text-gray-900 text-lg uppercase tracking-tight">${p.name}</h6>
                                        <p class="text-xs text-gray-400">${p.desc}</p>
                                    </div>
                                </div>
                                <button onclick="deleteProduct('${p.id}')" class="w-11 h-11 bg-white border border-gray-100 text-gray-400 rounded-xl hover:bg-red-600 hover:text-white transition-all"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        // --- SUBMIT HANDLERS ---

        async function handleAssetSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('assetBtn');
            btn.innerText = 'Publishing...';
            btn.disabled = true;
            const payload = {
                action: document.getElementById('assetId').value ? 'UPDATE_ASSET' : 'ADD_ASSET',
                password: adminPass,
                id: document.getElementById('assetId').value,
                product: document.getElementById('fAssetProduct').value,
                category: document.getElementById('fAssetCat').value,
                sub_category: document.getElementById('fAssetSub').value,
                title: document.getElementById('fAssetTitle').value,
                image_url: document.getElementById('fAssetImg').value,
                content: document.getElementById('fAssetContent').value
            };
            try {
                await fetch(API_URL, {method:'POST', body: JSON.stringify(payload)});
                await fetchDB();
                document.getElementById('assetForm').reset();
                document.getElementById('assetId').value = '';
                btn.innerText = 'Publish Asset';
                btn.disabled = false;
            } catch(e) { alert('Gagal menyimpan.'); btn.disabled = false; }
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('prodBtn');
            btn.innerText = 'Registering...';
            btn.disabled = true;
            const payload = {
                action: 'ADD_PRODUCT',
                password: adminPass,
                name: document.getElementById('fProdName').value,
                icon: document.getElementById('fProdIcon').value,
                color: document.getElementById('fProdColor').value,
                desc: document.getElementById('fProdDesc').value
            };
            try {
                await fetch(API_URL, {method:'POST', body: JSON.stringify(payload)});
                await fetchDB();
                document.getElementById('productForm').reset();
                btn.innerText = 'Create Silo';
                btn.disabled = false;
            } catch(e) { alert('Gagal menyimpan.'); btn.disabled = false; }
        }

        async function deleteAsset(id) { if(confirm('Hapus aset ini secara permanen?')) { await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'DELETE_ASSET', password:adminPass, id})}); await fetchDB(); } }
        async function deleteProduct(id) { if(confirm('Hapus Silo ini? Semua data aset di dalamnya akan tetap tersimpan di database.')) { await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'DELETE_PRODUCT', password:adminPass, id})}); await fetchDB(); } }

        function editAsset(id) {
            const a = db.assets.find(item => item.id == id);
            document.getElementById('assetId').value = a.id;
            document.getElementById('fAssetProduct').value = a.product;
            document.getElementById('fAssetCat').value = a.category;
            document.getElementById('fAssetSub').value = a.sub_category || '';
            document.getElementById('fAssetTitle').value = a.title;
            document.getElementById('fAssetImg').value = a.image_url;
            document.getElementById('fAssetContent').value = a.content;
            document.getElementById('assetBtn').innerText = 'Update Asset';
        }

        // --- UTILS ---

        function copyToClip(text) {
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const t = document.getElementById('toast'); t.style.opacity = '1'; 
            setTimeout(() => { t.style.opacity = '0'; }, 2000);
        }

        function previewHtml(code) {
            document.getElementById('previewFrame').srcdoc = code;
            document.getElementById('htmlPreview').classList.remove('hidden');
        }
        function closePreview() { document.getElementById('htmlPreview').classList.add('hidden'); }

        function showHome() { activeView = 'home'; renderHome(); }
        function closeAuth() { document.getElementById('adminAuth').classList.add('hidden'); }

        function doSearch() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            if(!q) return renderHome();
            const filtered = db.assets.filter(a => a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q) || a.category.toLowerCase().includes(q) || a.product.toLowerCase().includes(q));
            document.getElementById('headerTitle').innerText = "Search Results";
            document.getElementById('breadcrumb').classList.add('hidden');
            const html = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                    ${filtered.map(item => `
                        <div class="asset-card p-6 flex flex-col">
                            <p class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mb-2">${item.product} • ${item.category}</p>
                            <h6 class="font-bold text-gray-900 text-sm mb-6">${item.title}</h6>
                            <button onclick="copyToClip(\`${item.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)" class="w-full btn-saas py-2 text-[10px] uppercase tracking-widest">Salin Aset</button>
                        </div>
                    `).join('')}
                </div>`;
            document.getElementById('viewArea').innerHTML = html;
        }

        window.onload = fetchDB;
    </script>
</body>
</html>
