<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMersDocs | Asset OS v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome v6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #F9FAFB; 
            color: #111827;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar SaaS Layout */
        .sidebar { width: 280px; border-right: 1px solid #F3F4F6; background: white; z-index: 50; }
        
        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            margin: 4px 12px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #4B5563;
            transition: all 0.2s;
            cursor: pointer;
        }
        .sidebar-link:hover { background-color: #F3F4F6; color: #111827; }
        .sidebar-link.active { background-color: #EEF2FF; color: #4F46E5; }

        .alphabet-label {
            font-size: 10px;
            font-weight: 700;
            color: #9CA3AF;
            padding: 24px 28px 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .content-area { flex: 1; height: 100vh; overflow-y: auto; background-color: #FBFCFD; }

        /* Card Styles */
        .saas-card {
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .saas-card:hover { 
            border-color: #D1D5DB; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); 
            transform: translateY(-2px);
        }

        .asset-card {
            background: #FFFFFF;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s;
        }

        .saas-input {
            width: 100%;
            background: #FFFFFF;
            border: 1px solid #D1D5DB;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }
        .saas-input:focus { border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }

        .btn-black {
            background-color: #111827;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-black:hover { background-color: #1F2937; }
        
        .sub-cat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: white;
            border: 1px solid #E5E7EB;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            color: #4F46E5;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        #loading-overlay {
            position: fixed; inset: 0; background: white; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Animasi Loading -->
    <div id="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="w-10 h-10 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Mensinkronkan Aset...</p>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar flex flex-col h-full">
        <div class="p-8 flex items-center gap-3 cursor-pointer group" id="logoBtn">
            <div class="w-9 h-9 bg-indigo-600 rounded-lg flex items-center justify-center shadow-indigo-100 shadow-xl group-active:scale-90 transition-all">
                <i class="fa-solid fa-box-open text-white text-sm"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-gray-900">iMers<span class="text-indigo-600">Docs</span></h1>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar pb-10">
            <div class="px-6 mb-2">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-2">Main</p>
            </div>
            <div onclick="showHome()" class="sidebar-link active" id="navHome">
                <i class="fa-solid fa-house mr-3 w-4"></i> Overview
            </div>

            <!-- List produk per abjad -->
            <div id="sidebarProductList"></div>

            <!-- Area Admin Tersembunyi (Klik Logo 5x) -->
            <div id="adminMenu" class="hidden mt-8 border-t border-gray-100 pt-6">
                <div class="px-6 mb-2">
                    <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest px-2">Console</p>
                </div>
                <div onclick="checkAdmin('asset')" class="sidebar-link" id="navAsset">
                    <i class="fa-solid fa-file-pen mr-3 w-4 text-emerald-500"></i> Manage Assets
                </div>
                <div onclick="checkAdmin('product')" class="sidebar-link" id="navProduct">
                    <i class="fa-solid fa-layer-group mr-3 w-4 text-pink-500"></i> Manage Products
                </div>
            </div>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="content-area flex flex-col">
        
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-10 py-5 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-bold text-gray-900 cursor-pointer" id="headerTitle" onclick="showHome()">Library</h2>
                <div id="breadcrumb" class="hidden flex items-center gap-2">
                    <i class="fa-solid fa-chevron-right text-[8px] text-gray-300"></i>
                    <span id="breadcrumbProduct" class="text-xs text-gray-500 font-medium px-2 py-1 bg-gray-50 rounded-md cursor-pointer hover:bg-gray-100 transition-colors">Product</span>
                    <div id="breadcrumbCategoryContainer" class="hidden flex items-center gap-2">
                        <i class="fa-solid fa-chevron-right text-[8px] text-gray-300"></i>
                        <span id="breadcrumbCategory" class="text-xs text-indigo-600 font-semibold px-2 py-1 bg-indigo-50 rounded-md">Category</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="relative w-64 group">
                    <input type="text" id="globalSearch" oninput="doSearch()" placeholder="Cari aset..." class="saas-input pl-10 text-xs bg-gray-50 border-transparent focus:bg-white focus:border-gray-200 py-2.5">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                </div>
                <button onclick="logoutAdmin()" id="logoutBtn" class="hidden w-8 h-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-all">
                    <i class="fa-solid fa-power-off text-xs"></i>
                </button>
            </div>
        </header>

        <div id="viewArea" class="p-10 animate-in">
            <!-- Konten diinjeksi via JS -->
        </div>

    </main>

    <!-- MODAL AUTH -->
    <div id="adminAuth" class="hidden fixed inset-0 z-[100] bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-10 w-full max-w-sm rounded-2xl shadow-2xl">
            <h3 class="text-xl font-bold mb-2 text-center text-gray-900">Admin Console</h3>
            <input type="password" id="adminPass" placeholder="••••••••" class="saas-input text-center tracking-[1em] mb-8 font-black text-lg py-3">
            <div class="flex gap-4">
                <button onclick="closeAuth()" class="flex-1 py-3 text-xs font-bold text-gray-400 uppercase">Batal</button>
                <button onclick="loginAdmin()" class="flex-1 btn-black">Unlock</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-10 right-10 z-[200] opacity-0 pointer-events-none transition-all duration-500">
        <div class="bg-indigo-600 text-white px-6 py-3 rounded-xl flex items-center gap-3 shadow-2xl">
            <i class="fa-solid fa-circle-check text-white"></i>
            <span class="text-xs font-semibold">Teks berhasil disalin!</span>
        </div>
    </div>

    <!-- PREVIEW -->
    <div id="htmlPreview" class="hidden fixed inset-0 z-[150] bg-gray-900/50 backdrop-blur-md flex items-center justify-center p-12">
        <div class="bg-white w-full max-w-6xl h-full rounded-3xl overflow-hidden flex flex-col shadow-2xl">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h4 class="font-bold text-xs tracking-widest text-indigo-600 uppercase">Live Preview</h4>
                <button onclick="closePreview()" class="w-8 h-8 bg-gray-50 rounded-lg flex items-center justify-center transition-all"><i class="fa-solid fa-times"></i></button>
            </div>
            <iframe id="previewFrame" class="flex-1 w-full border-none"></iframe>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxxi-CuUu-jaXm5XN8pVl9xqQIHsBTHzPCu72clX210iTxaaFXc7yfh5R2uKXXTzFa3/exec';
        let db = { assets: [], products: [] };
        let adminPass = '';
        let clicks = 0;
        let activeView = 'home';
        let currentSilo = '';
        let currentCategory = '';

        // --- CORE ---
        document.getElementById('logoBtn').onclick = () => { if(++clicks >= 5) { document.getElementById('adminAuth').classList.remove('hidden'); clicks=0; } };
        function closeAuth() { document.getElementById('adminAuth').classList.add('hidden'); }

        async function fetchDB() {
            try {
                const res = await fetch(API_URL);
                const json = await res.json();
                if(json.status === 'success') {
                    db = json.data;
                    renderSidebar();
                    renderByView();
                }
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) { console.error('API Error.'); renderHome(); }
        }

        async function loginAdmin() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(API_URL, { method:'POST', body: JSON.stringify({action:'VERIFY', password:pass}) });
            const json = await res.json();
            if(json.status === 'success') {
                adminPass = pass;
                closeAuth();
                document.getElementById('adminMenu').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                renderByView();
            } else { alert('Master Key Salah!'); }
        }

        function logoutAdmin() {
            adminPass = '';
            document.getElementById('adminMenu').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            showHome();
        }

        function checkAdmin(view) {
            activeView = view;
            if(!adminPass) document.getElementById('adminAuth').classList.remove('hidden');
            else renderByView();
        }

        function renderByView() {
            if(activeView === 'home') renderHome();
            else if(activeView === 'categories') openVault(currentSilo);
            else if(activeView === 'assets') openCategory(currentSilo, currentCategory);
            else if(activeView === 'asset') renderAdminAssets();
            else if(activeView === 'product') renderAdminProducts();
        }

        function updateNav(activeId) {
            document.querySelectorAll('.sidebar-link').forEach(n => n.classList.remove('active'));
            const active = document.getElementById(activeId);
            if(active) active.classList.add('active');
        }

        function showHome() { 
            activeView = 'home'; 
            currentSilo = '';
            currentCategory = '';
            renderHome(); 
        }

        // --- SIDEBAR ---
        function renderSidebar() {
            if (!db.products) return;
            const sorted = [...db.products].sort((a,b) => a.name.localeCompare(b.name));
            const grouped = sorted.reduce((acc, p) => {
                const letter = p.name[0].toUpperCase();
                if(!acc[letter]) acc[letter] = [];
                acc[letter].push(p);
                return acc;
            }, {});

            let html = '';
            Object.keys(grouped).sort().forEach(letter => {
                html += `<div class="alphabet-label">${letter}</div>`;
                grouped[letter].forEach(p => {
                    html += `
                        <div onclick="openVault('${p.name}')" class="sidebar-link" id="side-${p.name}">
                            <i class="${p.icon || 'fa-solid fa-folder'} mr-3 w-4 opacity-50" style="color: ${p.color || '#4F46E5'}"></i> ${p.name}
                        </div>
                    `;
                });
            });
            document.getElementById('sidebarProductList').innerHTML = html;
        }

        // --- VIEWS ---

        // STEP 1: Overview
        function renderHome() {
            updateNav('navHome');
            document.getElementById('headerTitle').innerText = "Dashboard";
            document.getElementById('breadcrumb').classList.add('hidden');

            const html = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                    ${db.products.map(p => {
                        const count = db.assets.filter(a => a.product === p.name).length;
                        return `
                            <div onclick="openVault('${p.name}')" class="saas-card p-10 flex flex-col h-full group">
                                <div class="w-14 h-14 rounded-2xl flex items-center justify-center text-white mb-8 shadow-sm group-hover:scale-110 transition-transform" style="background: ${p.color || '#4F46E5'}">
                                    <i class="${p.icon || 'fa-solid fa-folder'} text-lg"></i>
                                </div>
                                <h4 class="text-lg font-bold text-gray-900 mb-2 uppercase tracking-tight">${p.name}</h4>
                                <p class="text-xs text-gray-400 mb-10 leading-relaxed">${p.desc || 'No description'}</p>
                                <div class="flex justify-between items-center mt-auto pt-6 border-t border-gray-50">
                                    <span class="text-[10px] font-bold uppercase text-indigo-600 tracking-widest">${count} Aset</span>
                                    <i class="fa-solid fa-arrow-right text-[10px] text-gray-300"></i>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        // STEP 2: Categories
        function openVault(name) {
            activeView = 'categories';
            currentSilo = name;
            updateNav(`side-${name}`);
            
            document.getElementById('headerTitle').innerText = name;
            document.getElementById('breadcrumb').classList.remove('hidden');
            document.getElementById('breadcrumbProduct').innerText = name;
            document.getElementById('breadcrumbProduct').onclick = () => openVault(name);
            document.getElementById('breadcrumbCategoryContainer').classList.add('hidden');

            const prodAssets = db.assets.filter(a => a.product === name);
            const categories = [...new Set(prodAssets.map(a => a.category))];

            if(categories.length === 0) {
                document.getElementById('viewArea').innerHTML = `<div class="py-40 text-center text-gray-300 font-bold uppercase tracking-widest animate-in">Silo ini kosong.</div>`;
                return;
            }

            const html = `
                <div class="mb-8">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Pilih Kategori</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                        ${categories.map(cat => {
                            const count = prodAssets.filter(a => a.category === cat).length;
                            return `
                                <div onclick="openCategory('${name}', '${cat}')" class="saas-card p-8 flex items-center justify-between group">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 bg-gray-50 rounded-xl flex items-center justify-center text-gray-400 group-hover:text-indigo-600 transition-all">
                                            <i class="fa-solid fa-folder-open text-lg"></i>
                                        </div>
                                        <div>
                                            <h5 class="font-bold text-gray-900 uppercase tracking-tight text-sm">${cat}</h5>
                                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${count} Items</p>
                                        </div>
                                    </div>
                                    <i class="fa-solid fa-chevron-right text-[10px] text-gray-200 group-hover:text-indigo-300"></i>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        // STEP 3: Assets
        function openCategory(productName, categoryName) {
            activeView = 'assets';
            currentSilo = productName;
            currentCategory = categoryName;

            document.getElementById('breadcrumbCategoryContainer').classList.remove('hidden');
            document.getElementById('breadcrumbCategory').innerText = categoryName;

            const assets = db.assets.filter(a => a.product === productName && a.category === categoryName);
            const subGroups = [...new Set(assets.map(a => a.sub_category || 'GENERAL'))];

            let html = `
                <div class="animate-in space-y-16">
                    ${subGroups.map(sub => `
                        <div class="space-y-6">
                            <div class="sub-cat-badge">
                                <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                                ${sub}
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                ${assets.filter(a => (a.sub_category || 'GENERAL') === sub).map(item => `
                                    <div class="asset-card flex flex-col group">
                                        ${item.image_url ? `<img src="${item.image_url}" class="w-full aspect-video object-cover rounded-xl mb-6 border border-gray-50 shadow-sm" onerror="this.style.display='none'">` : ''}
                                        <h6 class="font-bold text-gray-900 text-base leading-tight mb-4 uppercase tracking-tight">${item.title}</h6>
                                        <div class="bg-gray-50 border border-gray-100 rounded-xl p-5 text-[11px] leading-relaxed text-gray-500 mb-8 flex-1 whitespace-pre-line font-medium max-h-48 overflow-y-auto no-scrollbar">${item.content}</div>
                                        <div class="flex gap-2">
                                            <button onclick="copyToClip(\`${item.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)" class="flex-1 btn-black text-[10px] uppercase tracking-widest active:scale-95">Salin Teks</button>
                                            ${item.content.includes('<') ? `<button onclick="previewHtml(\`${item.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)" class="w-12 h-12 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-gray-400 hover:text-indigo-600 transition-all"><i class="fa-solid fa-eye text-xs"></i></button>` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('viewArea').innerHTML = html;
        }

        // --- ADMIN ---
        async function handleAssetSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('assetBtn');
            btn.innerText = 'Publishing...';
            btn.disabled = true;
            const payload = {
                action: document.getElementById('assetId').value ? 'UPDATE_ASSET' : 'ADD_ASSET',
                password: adminPass,
                id: document.getElementById('assetId').value,
                product: document.getElementById('fAssetProduct').value,
                category: document.getElementById('fAssetCat').value,
                sub_category: document.getElementById('fAssetSub').value,
                title: document.getElementById('fAssetTitle').value,
                image_url: document.getElementById('fAssetImg').value,
                content: document.getElementById('fAssetContent').value
            };
            try {
                await fetch(API_URL, {method:'POST', body: JSON.stringify(payload)});
                await fetchDB();
                document.getElementById('assetForm').reset();
                document.getElementById('assetId').value = '';
                btn.innerText = 'Publish to Vault';
                btn.disabled = false;
            } catch(e) { alert('Gagal.'); btn.disabled = false; }
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('prodBtn');
            btn.innerText = 'Registering...';
            const payload = {
                action: 'ADD_PRODUCT',
                password: adminPass,
                name: document.getElementById('fProdName').value,
                icon: document.getElementById('fProdIcon').value,
                color: document.getElementById('fProdColor').value,
                desc: document.getElementById('fProdDesc').value
            };
            try {
                await fetch(API_URL, {method:'POST', body: JSON.stringify(payload)});
                await fetchDB();
                document.getElementById('productForm').reset();
                btn.innerText = 'Create Silo';
            } catch(e) { alert('Gagal.'); }
        }

        async function deleteAsset(id) { if(confirm('Hapus?')) { await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'DELETE_ASSET', password:adminPass, id})}); await fetchDB(); } }
        async function deleteProduct(id) { if(confirm('Hapus?')) { await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'DELETE_PRODUCT', password:adminPass, id})}); await fetchDB(); } }

        function editAsset(id) {
            const a = db.assets.find(item => item.id == id);
            document.getElementById('assetId').value = a.id;
            document.getElementById('fAssetProduct').value = a.product;
            document.getElementById('fAssetCat').value = a.category;
            document.getElementById('fAssetSub').value = a.sub_category || '';
            document.getElementById('fAssetTitle').value = a.title;
            document.getElementById('fAssetImg').value = a.image_url;
            document.getElementById('fAssetContent').value = a.content;
            document.getElementById('assetBtn').innerText = 'Update Asset';
        }

        function copyToClip(text) {
            const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const t = document.getElementById('toast'); t.style.opacity = '1'; 
            setTimeout(() => { t.style.opacity = '0'; }, 2000);
        }

        function previewHtml(code) { document.getElementById('previewFrame').srcdoc = code; document.getElementById('htmlPreview').classList.remove('hidden'); }
        function closePreview() { document.getElementById('htmlPreview').classList.add('hidden'); }
        function doSearch() {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            if(!q) return renderHome();
            const filtered = db.assets.filter(a => a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q) || a.category.toLowerCase().includes(q) || a.product.toLowerCase().includes(q));
            document.getElementById('viewArea').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in">
                ${filtered.map(item => `<div class="asset-card p-6 flex flex-col">
                    <p class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mb-2">${item.product} • ${item.category}</p>
                    <h6 class="font-bold text-gray-900 text-sm mb-6">${item.title}</h6>
                    <button onclick="copyToClip(\`${item.content.replace(/`/g,'\\`').replace(/\$/g,'\\$')}\`)" class="w-full btn-black py-2 text-[10px] uppercase">Salin Aset</button>
                </div>`).join('')}
            </div>`;
        }

        window.onload = fetchDB;
    </script>
</body>
</html>
